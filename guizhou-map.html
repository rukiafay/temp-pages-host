<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贵州五晚自驾行程地图 V3</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5}
.header{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff;padding:18px 28px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.header h1{font-size:22px;font-weight:600}
.header p{font-size:13px;opacity:.85;margin-top:4px}
.main{display:flex;height:calc(100vh - 76px)}
.sidebar{width:370px;background:#fff;overflow-y:auto;border-right:1px solid #e0e0e0;box-shadow:2px 0 10px rgba(0,0,0,.05)}
.sidebar::-webkit-scrollbar{width:5px}
.sidebar::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}
.day-section{border-bottom:1px solid #f0f0f0}
.day-header{display:flex;align-items:center;padding:13px 16px;cursor:pointer;transition:background .2s;user-select:none}
.day-header:hover{background:#f8f9fa}
.day-header.active{background:#e8f4fd}
.day-badge{width:42px;height:42px;border-radius:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-weight:700;margin-right:11px;flex-shrink:0}
.day-badge .num{font-size:17px;line-height:1}
.day-badge .label{font-size:9px;opacity:.9;margin-top:2px}
.d0{background:linear-gradient(135deg,#34495e,#576574)}.d1{background:linear-gradient(135deg,#27ae60,#2ecc71)}.d2{background:linear-gradient(135deg,#f39c12,#e67e22)}.d3{background:linear-gradient(135deg,#8e44ad,#9b59b6)}.d4{background:linear-gradient(135deg,#16a085,#1abc9c)}
.day-title{flex:1}
.day-title h3{font-size:14px;font-weight:600;color:#2c3e50}
.day-title p{font-size:11px;color:#7f8c8d;margin-top:2px}
.day-arrow{color:#bdc3c7;font-size:11px;transition:transform .3s}
.day-header.active .day-arrow{transform:rotate(90deg)}
.day-content{max-height:0;overflow:hidden;transition:max-height .4s ease;background:#fafbfc}
.day-content.open{max-height:2000px}
.timeline{padding:5px 16px 14px 66px;position:relative}
.timeline::before{content:'';position:absolute;left:37px;top:0;bottom:14px;width:2px;background:#e0e0e0}
.tl-item{position:relative;margin-bottom:10px}
.tl-item::before{content:'';position:absolute;left:-29px;top:6px;width:8px;height:8px;border-radius:50%;background:#3498db;border:2px solid #fff;box-shadow:0 0 0 2px #3498db}
.tl-item.hotel::before{background:#e74c3c;box-shadow:0 0 0 2px #e74c3c}
.tl-item.food::before{background:#f39c12;box-shadow:0 0 0 2px #f39c12}
.tl-item.coffee::before{background:#8e44ad;box-shadow:0 0 0 2px #8e44ad}
.tl-item.alert::before{background:#e74c3c;box-shadow:0 0 0 2px #e74c3c}
.tl-time{font-size:10px;color:#95a5a6;font-weight:600}
.tl-text{font-size:12px;color:#2c3e50;margin-top:2px;line-height:1.5}
.tl-text strong{color:#2c3e50}
.tl-tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-right:3px;font-weight:500}
.tag-scenic{background:#e8f8f5;color:#1abc9c}.tag-hotel{background:#fdedec;color:#e74c3c}.tag-food{background:#fef9e7;color:#f39c12}
.tag-coffee{background:#f4ecf7;color:#8e44ad}.tag-alert{background:#fdedec;color:#e74c3c}.tag-drive{background:#eaf2f8;color:#2980b9}
.map-container{flex:1;position:relative}
#mapContainer{width:100%;height:100%}
.legend{position:absolute;bottom:20px;left:20px;background:#fff;padding:12px 15px;border-radius:10px;box-shadow:0 2px 12px rgba(0,0,0,.15);font-size:11px;z-index:100}
.legend-title{font-weight:600;margin-bottom:6px;color:#2c3e50;font-size:12px}
.legend-item{display:flex;align-items:center;margin-bottom:3px}
.legend-dot{width:10px;height:10px;border-radius:50%;margin-right:6px;flex-shrink:0}
.legend-line{width:18px;height:3px;margin-right:6px;border-radius:2px;flex-shrink:0}
@media(max-width:768px){.main{flex-direction:column}.sidebar{width:100%;height:50vh}.map-container{height:50vh}}
</style>
</head>
<body>
<div class="header">
<h1>🚗 贵州五晚自驾行程地图 V3</h1>
<p>2026.04.29 - 05.04 ｜ 重美食 · 避五一 · 轻徒步 ｜ 不去黄果树</p>
</div>
<div class="main">
<div class="sidebar" id="sidebar"></div>
<div class="map-container"><div id="mapContainer"></div>
<div class="legend">
<div class="legend-title">📍 图例</div>
<div class="legend-item"><div class="legend-dot" style="background:#e74c3c"></div>🏨 住宿酒店</div>
<div class="legend-item"><div class="legend-dot" style="background:#3498db"></div>🏔️ 景点/徒步</div>
<div class="legend-item"><div class="legend-dot" style="background:#f39c12"></div>🍽️ 美食</div>
<div class="legend-item"><div class="legend-dot" style="background:#8e44ad"></div>☕ 咖啡</div>
<div class="legend-item"><div class="legend-line" style="background:#2e86c1"></div>行车路线</div>
</div></div>
</div>
<script src="https://webapi.amap.com/maps?v=2.0&key=78ea49e8a56f4a2c2ba59ccf52cf6b2c"></script>
<script>
var days=[
{num:0,date:"4/29 周三",title:"抵达+天印山",sub:"机场特色午餐 → 天印山秘境 → 镇宁美食",cls:"d0",
items:[
{t:"12:00",tag:"food",tagT:"🍜 特色午餐",txt:"机场旁 <b>酸汤牛肉</b>（本地人苍蝇小店）"},
{t:"13:00",tag:"drive",tagT:"🚗 ~1.5h",txt:"贵阳 → 镇宁天印山"},
{t:"14:30",tag:"hotel",tagT:"🏨",txt:"天印山·屿山牧龙 check in"},
{t:"15:00",tag:"scenic",tagT:"🏔️",txt:"<b>天印山</b> — \"贵阳版阿勒泰\"，免费"},
{t:"17:30",tag:"food",tagT:"🍽️ 镇宁美食",txt:"<b>油糯米饭、剪粉、油炸鸡蛋糕、夺夺粉</b>"}
]},
{num:1,date:"4/30 周四",title:"龙宫溶洞+咖啡",sub:"森林咖啡 → 龙宫溶洞 → 安顺第一轮美食",cls:"d1",
items:[
{t:"10:30",tag:"drive",tagT:"🚗 ~40min",txt:"天印山 → 龙宫翠山房"},
{t:"11:10",tag:"hotel",tagT:"🏨",txt:"龙宫·翠山房 check in"},
{t:"11:10",tag:"coffee",tagT:"☕ 森林咖啡",txt:"翠山房 <b>森林咖啡角</b> — 氧吧庭院"},
{t:"12:30",tag:"food",tagT:"🍜 午餐",txt:"龙宫镇牛肉粉 / 酒店餐厅"},
{t:"14:00",tag:"scenic",tagT:"⛰️",txt:"<b>龙宫景区</b> — 一进龙宫→二进龙宫→通漩河→群芳谷→龙字田"},
{t:"17:00",tag:"coffee",tagT:"☕ 溶洞咖啡",txt:"<b>溶洞瀑布咖啡馆</b> — 溶洞+瀑布+咖啡"},
{t:"18:30",tag:"food",tagT:"🍽️ 安顺美食",txt:"<b>何记裹卷、宫鼎茶、新桥臭豆腐、罗记肉饼</b>"}
]},
{num:2,date:"5/1 周五",title:"安顺深度逛吃日",sub:"不赶景点！安顺古城美食暴走一整天",cls:"d2",
items:[
{t:"10:30",tag:"drive",tagT:"🚗 ~40min",txt:"翠山房 → 半山酒店 check in（紧邻好吃街！）"},
{t:"11:30",tag:"food",tagT:"🍜 早餐+午餐",txt:"<b>段记破酥包 → 支记牛肉粉 → 小翔干面 → 卢家剪粉</b>"},
{t:"14:00",tag:"scenic",tagT:"🏛️",txt:"<b>安顺文庙</b> — 贵州最古老文庙，国保单位"},
{t:"15:00",tag:"coffee",tagT:"☕",txt:"安顺城区 <b>独立咖啡馆</b>"},
{t:"16:30",tag:"food",tagT:"🔥 美食第二轮",txt:"<b>王记裹卷 → 小芳砂锅凉粉 → 龙老太夺夺粉火锅</b>"},
{t:"18:30",tag:"food",tagT:"🔥 美食第三轮",txt:"<b>黔府豆米火锅 → 汪姨妈糯食 → 清明粑 → 冰浆</b>"}
]},
{num:3,date:"5/2 周六",title:"徒步秘境",sub:"铜鼓荡+牛倒岩+大圣之眼 ｜ 野生免费路线",cls:"d3",
items:[
{t:"10:00",tag:"food",tagT:"🍜 早餐",txt:"<b>千秋鹅肉粉面</b> — 安顺特色"},
{t:"11:00",tag:"drive",tagT:"🚗 ~1h",txt:"安顺 → 铜鼓荡"},
{t:"12:00",tag:"scenic",tagT:"🪨",txt:"<b>铜鼓荡</b> — \"异域星球\"石林。自带干粮野餐！"},
{t:"14:00",tag:"scenic",tagT:"🕳️",txt:"<b>牛倒岩</b> — \"盗墓笔记地心世界\""},
{t:"15:30",tag:"scenic",tagT:"👁️",txt:"<b>大圣之眼</b> — 悟空之眼天窗"},
{t:"18:30",tag:"hotel",tagT:"🏨",txt:"大岩上民宿 check in（云山屯村）"},
{t:"19:00",tag:"food",tagT:"🍽️",txt:"<b>屯堡农家菜 / 旧州辣子鸡</b>"}
]},
{num:4,date:"5/3 周日",title:"屯堡+花溪青岩",sub:"云山屯明代古寨 → 夜郎谷 → 青岩古镇",cls:"d4",
items:[
{t:"09:30",tag:"scenic",tagT:"🏘️",txt:"<b>云山屯古寨</b>（民宿旁）— 600年明代屯堡"},
{t:"11:30",tag:"food",tagT:"🍜",txt:"七眼桥镇午餐 / 屯堡家常菜"},
{t:"12:30",tag:"drive",tagT:"🚗 ~1.5h",txt:"大岩上 → 花溪青岩"},
{t:"14:00",tag:"hotel",tagT:"🏨",txt:"青岩循美里·青隐山居 check in"},
{t:"15:00",tag:"scenic",tagT:"🧱",txt:"<b>夜郎谷</b> — 石头城堡，20元"},
{t:"16:30",tag:"scenic",tagT:"🏯",txt:"<b>青岩古镇</b> — 600年古镇，5A"},
{t:"18:00",tag:"food",tagT:"🍽️",txt:"<b>卤猪脚、花溪牛肉粉、糕粑稀饭、玫瑰糖</b>"}
]}
];
function renderSidebar(){
var sb=document.getElementById('sidebar'),h='';
days.forEach(function(d,i){
var cls=i===2?' active':'';
h+='<div class="day-section"><div class="day-header'+cls+'" onclick="toggleDay(this,'+i+')">';
h+='<div class="day-badge '+d.cls+'"><span class="num">'+d.num+'</span><span class="label">'+d.date.split(' ')[1]+'</span></div>';
h+='<div class="day-title"><h3>'+d.date+' · '+d.title+'</h3><p>'+d.sub+'</p></div>';
h+='<span class="day-arrow">▶</span></div>';
h+='<div class="day-content'+(i===2?' open':'')+'" id="day'+i+'"><div class="timeline">';
d.items.forEach(function(it){
var ic=it.tag==='hotel'?' hotel':it.tag==='food'?' food':it.tag==='coffee'?' coffee':it.tag==='alert'?' alert':'';
h+='<div class="tl-item'+ic+'"><div class="tl-time">'+it.t+'</div><div class="tl-text">';
if(it.tagT)h+='<span class="tl-tag tag-'+it.tag+'">'+it.tagT+'</span>';
h+=it.txt+'</div></div>';
});
h+='</div></div></div>';
});
sb.innerHTML=h;
}
function toggleDay(el,i){
var c=document.getElementById('day'+i);
el.classList.toggle('active');c.classList.toggle('open');
}
renderSidebar();

var map=new AMap.Map('mapContainer',{zoom:9,center:[106.2,26.1],mapStyle:'amap://styles/fresh'});
var icons={hotel:'https://webapi.amap.com/theme/v1.3/markers/n/mark_r.png',scenic:'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',food:'https://webapi.amap.com/theme/v1.3/markers/n/mark_o.png',coffee:'https://webapi.amap.com/theme/v1.3/markers/n/mark_p.png',start:'https://webapi.amap.com/theme/v1.3/markers/n/start.png'};
var pts=[
{lng:106.7137,lat:26.5862,title:"贵阳龙洞堡机场",type:"start"},
{lng:105.8420,lat:25.9200,title:"天印山·屿山牧龙",type:"hotel"},
{lng:105.8800,lat:25.9800,title:"天印山景区",type:"scenic"},
{lng:105.9200,lat:26.0000,title:"龙宫·翠山房",type:"hotel"},
{lng:105.9200,lat:26.0050,title:"龙宫景区",type:"scenic"},
{lng:105.9465,lat:26.2450,title:"半山酒店(安顺好吃街)",type:"hotel"},
{lng:105.9465,lat:26.2550,title:"安顺古城美食区(顾府街)",type:"food"},
{lng:105.9480,lat:26.2600,title:"安顺文庙",type:"scenic"},
{lng:105.9500,lat:26.0600,title:"铜鼓荡",type:"scenic"},
{lng:105.9700,lat:26.0800,title:"牛倒岩",type:"scenic"},
{lng:105.9800,lat:26.0900,title:"大圣之眼",type:"scenic"},
{lng:106.0500,lat:26.2800,title:"大岩上民宿(云山屯)",type:"hotel"},
{lng:106.0500,lat:26.2850,title:"云山屯古寨",type:"scenic"},
{lng:106.6300,lat:26.3700,title:"花溪夜郎谷",type:"scenic"},
{lng:106.6700,lat:26.3400,title:"青岩古镇",type:"scenic"},
{lng:106.6500,lat:26.3500,title:"青岩循美里·青隐山居",type:"hotel"}
];
pts.forEach(function(p){
var icon=icons[p.type]||icons.scenic;
var marker=new AMap.Marker({position:[p.lng,p.lat],title:p.title,icon:new AMap.Icon({size:new AMap.Size(25,34),image:icon,imageSize:new AMap.Size(25,34)})});
marker.bindLabel(p.title,{direction:'top',offset:new AMap.Pixel(0,-5)});
marker.on('click',function(){map.setZoomAndCenter(14,[p.lng,p.lat])});
map.add(marker);
});
var route=[[106.7137,26.5862],[105.8420,25.9200],[105.9200,26.0000],[105.9465,26.2450],[105.9500,26.0600],[105.9800,26.0900],[106.0500,26.2800],[106.6500,26.3500]];
map.add(new AMap.Polyline({path:route.map(function(r){return new AMap.LngLat(r[0],r[1])}),strokeColor:'#2e86c1',strokeWeight:4,strokeOpacity:0.7,lineJoin:'round',lineCap:'round',showDir:true}));
map.addControl(new AMap.ToolBar({position:'RB'}));
setTimeout(function(){map.setFitView()},500);
</script>
</body>
</html>
